<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
  </head>
  <body>
    <!-- HEADER -->
    <header class="main-header">
      <img
        src="./images/musubi-sticker.png"
        alt="website profile picture"
        width="75px"
      />
      <nav class="main-header-nav">
        <ul class="main-header-nav-list">
          <li><a href="#">Home</a></li>
          <li><a href="./portfolio.html">Portfolio</a></li>
          <li><a href="./about.html">About</a></li>
          <li><a href="./contact.html">Contact</a></li>
        </ul>
        <img
          class="mobile-menu-button"
          src="./images/menu-outline.svg"
          alt="dropdown menu button"
          width="50px"
        />
      </nav>
    </header>

    <!-- MAIN -->
    <main>
      <section class="hero-section">
        <div class="hero-title">
          <h1>Aidan Henning</h1>
          <address>
            <p>
              <img
                src="./images/pin-outline.svg"
                alt="drop pin"
                width="15rem"
              />Santa Monica, California
            </p>
          </address>
          <p>
            Hi! I'm Aidan, a Full-Stack Web Developer. I create professional
            websites for businesses, freelancers, and for fun!
          </p>
          <button class="hero-button">
            <a href="./portfolio.html">See My Work →</a>
          </button>
        </div>
        <div class="hero-social-links">
          <a target="_blank" href="https://www.linkedin.com/in/aidanhenning/"
            ><img
              src="./images/logo-linkedin.svg"
              alt="LinkedIn icon"
              width="40px"
          /></a>
          <a target="_blank" href="https://github.com/aidanhenning"
            ><img src="./images/logo-github.svg" alt="Github icon" width="40px"
          /></a>
        </div>
      </section>

    <!-- FOOTER -->
    <footer>&2025 All Rights Reserved</footer>
