<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="main-header">
      <img
        src="./images/musubi-sticker.png"
        alt="website profile picture"
        width="75px"
      />
      <nav class="main-header-nav">
        <ul class="main-header-nav-list">
          <li><a href="./index.html">Home</a></li>
          <li><a href="./portfolio.html">Portfolio</a></li>
          <li><a href="./about.html">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
        <img
          class="mobile-menu-button"
          src="./images/menu-outline.svg"
          alt="dropdown menu button"
          width="50px"
        />
      </nav>
    </header>

    <!-- MAIN -->
    <main>
      <section class="contact-section">
        <h1 class="contact-main-header">Let's work together</h1>
        <form class="contact-form">
          <label for="fname">First Name</label><br />
          <input type="text" id="fname" name="fname" /><br />
          <label for="lname">Last Name</label><br />
          <input type="text" id="lname" name="lname" /><br />
          <label for="email">Email</label><br />
          <input type="email" id="email" name="email" /><br />
          <label for="message">Message</label><br />
          <input type="text" id="message" name="message" /><br />
          <input type="submit" value="Submit" class="contact-submit-button" />
        </form>
      </section>
    </main>

    <!-- FOOTER -->
    <footer>&2025 All Rights Reserved</footer>
  </body>
</html>
